<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarjeta de Perfil</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="app">
    <div id="tarjeta" style="display:none;">
      <img id="avatar" src="" alt="Avatar del usuario">
      <h2 id="nombre"></h2>
      <p id="usuario"></p>
      <p id="email"></p>
      <p id="ciudad"></p>
      <div id="etiquetas"></div>
    </div>

    <p id="mensaje"></p>
    <button id="btn">Cargar Usuario</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
